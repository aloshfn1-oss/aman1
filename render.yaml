services:
  - type: web
    name: aman-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --legacy-peer-deps && ./node_modules/.bin/prisma generate && npm run build
    startCommand: ./node_modules/.bin/prisma migrate deploy && node dist/main.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 3600
      - key: JWT_REFRESH_TTL
        value: 2592000
      - key: OTP_PROVIDER
        value: mock
      - key: OTP_FROM
        value: Aman
      - key: OTP_TTL_SECONDS
        value: 300
      - key: USDT_WEBHOOK_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_PHONE
        value: "+963999999999"
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
